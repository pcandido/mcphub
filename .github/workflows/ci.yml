name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - run: npm ci

      - name: Check JavaScript syntax
        run: npm run check

      - name: Run tests
        run: npm test

      - name: Verify shebang
        run: |
          head -1 bin/gtwmcp.js | grep -q "node"
          echo "✅ Shebang OK"

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Verify package.json
        run: |
          node -e "
            const pkg = JSON.parse(require('fs').readFileSync('package.json','utf-8'));
            console.log('Package:', pkg.name, pkg.version);
            if (!pkg.bin?.gtwmcp) throw new Error('Missing bin entry');
            console.log('✅ package.json valid');
          "
